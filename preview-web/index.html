<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="pageTitle">自定义闹钟与作息组</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <div class="hero-copy-block">
        <p class="eyebrow" id="heroEyebrow">网页预览</p>
        <h1 id="heroTitle">自定义闹钟与作息组</h1>
        <p class="hero-copy" id="heroCopy"></p>
      </div>
      <div class="hero-stats" id="heroStats"></div>
    </header>

    <main class="workspace">
      <section class="phone-frame">
        <div class="phone-screen">
          <div class="screen-header">
            <div>
              <p class="screen-label" id="screenLabel">首页</p>
              <h2 id="screenTitle">自定义闹钟与作息组</h2>
            </div>
            <div class="screen-actions">
              <button class="ghost-button" id="openSettingsButton">权限</button>
              <button class="ghost-button" id="resetDemoButton">重置</button>
            </div>
          </div>

          <section class="overview-card" id="overviewCard"></section>
          <div class="permission-strip" id="permissionStrip"></div>

          <div class="section-head">
            <div>
              <p class="section-kicker" id="standardKicker">普通闹钟</p>
              <h3 id="standardTitle">普通闹钟</h3>
            </div>
            <button class="pill-button" id="addNormalAlarmButton">+ 添加闹钟</button>
          </div>
          <div id="normalAlarmList" class="card-list"></div>

          <div class="section-head section-head-spaced">
            <div>
              <p class="section-kicker" id="routineKicker">作息模式</p>
              <h3 id="routineTitle">作息组</h3>
            </div>
            <button class="pill-button accent" id="addRoutineButton">+ 新建作息组</button>
          </div>
          <div id="routineGroupList" class="card-list"></div>
        </div>
      </section>

      <aside class="side-panel">
        <section class="side-block">
          <div class="side-top">
            <div>
              <p class="panel-tag" id="timelineTag">即将响铃</p>
              <h3 id="timelineTitle">统一时间线</h3>
            </div>
            <button class="ghost-button" id="exportStateButton">导出 JSON</button>
          </div>
          <div id="timelineList" class="timeline-list"></div>
        </section>

        <section class="side-block">
          <div class="panel-empty" id="detailEmpty">
            <p class="panel-tag" id="detailTag">作息详情</p>
            <h3 id="detailPlaceholderTitle">请选择一个作息组</h3>
            <p id="detailPlaceholderCopy">右侧会展示作息组总开关，以及该组内的全部闹钟。</p>
          </div>

          <div class="panel-detail hidden" id="detailContent">
            <div class="detail-top">
              <div>
                <p class="panel-tag">作息组</p>
                <h3 id="detailTitle"></h3>
                <p id="detailSummary"></p>
              </div>
              <label class="switch">
                <input type="checkbox" id="detailGroupToggle" />
                <span class="switch-track"></span>
              </label>
            </div>
            <div class="detail-actions">
              <button class="pill-button" id="editRoutineButton">编辑作息组</button>
              <button class="pill-button accent" id="addRoutineAlarmButton">+ 添加组内闹钟</button>
            </div>
            <div id="detailAlarmList" class="card-list"></div>
          </div>
        </section>
      </aside>
    </main>
  </div>

  <div class="modal-backdrop hidden" id="editorModal">
    <div class="modal-card">
      <div class="modal-head">
        <div>
          <p class="panel-tag" id="editorTag">编辑器</p>
          <h3 id="editorTitle">新增项目</h3>
        </div>
        <button class="ghost-button" id="closeEditorButton">关闭</button>
      </div>

      <form id="editorForm" class="editor-form">
        <div class="form-grid" id="timeFields">
          <label>
            <span id="timeHourLabel">小时</span>
            <input type="number" id="hourInput" min="0" max="23" />
          </label>
          <label>
            <span id="timeMinuteLabel">分钟</span>
            <input type="number" id="minuteInput" min="0" max="59" />
          </label>
        </div>

        <label>
          <span id="labelFieldTitle">标签</span>
          <input type="text" id="labelInput" placeholder="早起学习" />
        </label>

        <label id="routineGroupField" class="hidden">
          <span id="routineGroupLabel">所属作息组</span>
          <select id="routineGroupSelect"></select>
        </label>

        <div id="weekdayBlock">
          <span class="input-label" id="repeatLabel">重复日期</span>
          <div class="weekday-grid" id="weekdayGrid"></div>
        </div>

        <div class="form-grid toggles" id="alarmToggleFields">
          <label class="toggle-line"><span id="vibrateLabel">震动</span><input type="checkbox" id="vibrateInput" /></label>
          <label class="toggle-line"><span id="snoozeLabel">贪睡</span><input type="checkbox" id="snoozeEnabledInput" /></label>
        </div>

        <label id="snoozeField">
          <span id="snoozeMinutesLabel">贪睡分钟</span>
          <input type="number" id="snoozeMinutesInput" min="1" max="30" value="10" />
        </label>

        <label class="toggle-line">
          <span id="enabledFieldLabel">保存后启用</span>
          <input type="checkbox" id="enabledInput" />
        </label>

        <p class="form-hint" id="editorHint"></p>

        <div class="modal-actions">
          <button type="button" class="pill-button hidden" id="deleteButton">删除</button>
          <button type="submit" class="pill-button accent" id="saveButton">保存</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal-backdrop hidden" id="moveModal">
    <div class="modal-card move-card">
      <div class="modal-head">
        <div>
          <p class="panel-tag">快捷移动</p>
          <h3 id="moveTitle">移动闹钟</h3>
        </div>
        <button class="ghost-button" id="closeMoveButton">关闭</button>
      </div>
      <p class="modal-copy" id="moveDescription"></p>
      <div class="move-actions">
        <button type="button" class="pill-button" id="moveToStandardButton">移回普通闹钟</button>
      </div>
      <div class="move-options" id="moveOptions"></div>
    </div>
  </div>

  <div class="modal-backdrop hidden" id="settingsModal">
    <div class="modal-card settings-card">
      <div class="modal-head">
        <div>
          <p class="panel-tag" id="settingsTag">权限</p>
          <h3 id="settingsTitle">闹钟能力开关</h3>
        </div>
        <button class="ghost-button" id="closeSettingsButton">关闭</button>
      </div>
      <div class="settings-list">
        <div class="settings-item">
          <div>
            <strong id="exactAlarmTitle">精确闹钟</strong>
            <p id="exactAlarmCopy">模拟 Android 的精确闹钟调度权限。</p>
          </div>
          <label class="switch"><input type="checkbox" id="exactPermissionToggle" /><span class="switch-track"></span></label>
        </div>
        <div class="settings-item">
          <div>
            <strong id="notificationsTitle">通知权限</strong>
            <p id="notificationsCopy">模拟响铃通知是否可用。</p>
          </div>
          <label class="switch"><input type="checkbox" id="notificationPermissionToggle" /><span class="switch-track"></span></label>
        </div>
      </div>
    </div>
  </div>

  <div class="toast hidden" id="toast"></div>
  <script src="./app.js"></script>
</body>
</html>

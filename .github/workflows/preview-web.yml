name: Preview Web

on:
  workflow_dispatch:
  push:
    paths:
      - "preview-web/**"
      - ".github/workflows/preview-web.yml"

jobs:
  deploy-preview:
    runs-on: self-hosted
    timeout-minutes: 10
    env:
      PREVIEW_WEB_PORT: "8091"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Validate preview files
        shell: bash
        run: |
          set -euo pipefail
          test -f preview-web/index.html
          test -f preview-web/styles.css
          test -f preview-web/app.js
          test -f deploy/deploy_preview_web.sh
          grep -q '<script src="./app.js"></script>' preview-web/index.html

      - name: Deploy static preview
        shell: bash
        run: |
          set -euo pipefail
          chmod +x deploy/deploy_preview_web.sh
          ./deploy/deploy_preview_web.sh

      - name: Verify preview service
        shell: bash
        run: |
          set -euo pipefail
          curl -fsS "http://127.0.0.1:${PREVIEW_WEB_PORT}/" >/dev/null
          echo "Preview web is available on port ${PREVIEW_WEB_PORT}"

      - name: Print preview url hint
        shell: bash
        run: |
          set -euo pipefail
          echo "Preview web port: ${PREVIEW_WEB_PORT}"
